<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 630px;
    background: #FFFDF8;
    font-family: 'JetBrains Mono', monospace;
    display: flex;
    overflow: hidden;
    position: relative;
  }

  /* Subtle dot pattern */
  .grid-bg {
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(circle, rgba(45, 184, 122, 0.06) 1px, transparent 1px);
    background-size: 36px 36px;
  }

  /* Sunrise glow top-left */
  .glow {
    position: absolute;
    top: -160px;
    left: -120px;
    width: 600px;
    height: 600px;
    background: radial-gradient(ellipse, rgba(229, 160, 48, 0.09) 0%, rgba(45, 184, 122, 0.04) 50%, transparent 70%);
  }

  .content {
    position: relative;
    z-index: 1;
    padding: 72px 80px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    width: 100%;
    height: 100%;
  }

  .top {
    display: flex;
    flex-direction: column;
    gap: 28px;
  }

  .logo {
    font-size: 20px;
    font-weight: 700;
    color: #1a1c17;
    letter-spacing: -0.03em;
  }

  .logo .dot { color: #e5a030; }

  h1 {
    font-size: 52px;
    font-weight: 700;
    line-height: 1.15;
    letter-spacing: -0.04em;
    color: #1a1c17;
    max-width: 750px;
  }

  h1 .green { color: #2db87a; }

  .subtitle {
    font-size: 18px;
    font-weight: 400;
    color: #7a7565;
    line-height: 1.6;
    max-width: 600px;
  }

  .bottom {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
  }

  .pills {
    display: flex;
    gap: 8px;
  }

  .pill {
    font-size: 11px;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid #E4DFD2;
    color: #7a7565;
    background: #fff;
  }

  .pill.green-pill {
    border-color: rgba(45, 184, 122, 0.3);
    color: #2db87a;
    background: rgba(45, 184, 122, 0.06);
  }

  .chain {
    font-size: 13px;
    color: #B8B2A5;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .chain-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #2db87a;
  }

  /* Token card floating on right side */
  .token-card {
    position: absolute;
    right: 80px;
    top: 50%;
    transform: translateY(-50%);
    width: 200px;
    height: 200px;
    border-radius: 16px;
    background: linear-gradient(145deg, #f0faf5, #FFFDF8);
    border: 1px solid rgba(45, 184, 122, 0.2);
    box-shadow: 0 8px 40px rgba(0,0,0,0.07);
    padding: 24px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    z-index: 2;
  }

  .tc-accent {
    width: 40px;
    height: 3px;
    border-radius: 2px;
    background: linear-gradient(90deg, #2db87a, #e5a030);
    opacity: 0.9;
  }

  .tc-type {
    font-size: 9px;
    letter-spacing: 2px;
    color: #2db87a;
    opacity: 0.7;
    margin-top: 10px;
  }

  .tc-sb {
    font-size: 8px;
    color: #2db87a;
    opacity: 0.4;
    margin-top: 2px;
  }

  .tc-bottom { margin-top: auto; }

  .tc-name {
    font-size: 15px;
    font-weight: 600;
    color: #1e9e65;
  }

  .tc-brand {
    font-size: 9px;
    color: #e5a030;
    opacity: 0.35;
    margin-top: 4px;
  }
</style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="glow"></div>

  <div class="content">
    <div class="top">
      <div class="logo">mint<span class="dot">.</span>day</div>
      <h1>Free <span class="green">NFT minting</span> for agents.</h1>
      <div class="subtitle">No wallet. No gas. No code. One MCP tool call.</div>
    </div>
    <div class="bottom">
      <div class="pills">
        <span class="pill green-pill">gas sponsored</span>
        <span class="pill">zero config</span>
        <span class="pill">MCP server</span>
      </div>
      <div class="chain"><span class="chain-dot"></span> Base mainnet</div>
    </div>
  </div>

  <div class="token-card">
    <div>
      <div class="tc-accent"></div>
      <div class="tc-type">ATTESTATION</div>
      <div class="tc-sb">SOULBOUND</div>
    </div>
    <div class="tc-bottom">
      <div class="tc-name">token #0</div>
      <div class="tc-brand">mint.day</div>
    </div>
  </div>
</body>
</html>
