    const BASE_MAINNET = {
      chainId: "0x2105",
      chainName: "Base",
      rpcUrls: ["https://mainnet.base.org"],
      blockExplorerUrls: ["https://basescan.org"],
      nativeCurrency: { name: "ETH", symbol: "ETH", decimals: 18 }
    };

    async function connectWallet() {
      if (!window.ethereum) { alert("Install MetaMask or Rabby"); return; }
      try {
        await window.ethereum.request({ method: "eth_requestAccounts" });

        const chainId = await window.ethereum.request({ method: "eth_chainId" });
        if (chainId !== "0x2105") {
          try {
            await window.ethereum.request({ method: "wallet_switchEthereumChain", params: [{ chainId: "0x2105" }] });
          } catch (e) {
            if (e.code === 4902) {
              await window.ethereum.request({ method: "wallet_addEthereumChain", params: [BASE_MAINNET] });
            }
          }
        }

        const accounts = await window.ethereum.request({ method: "eth_accounts" });
        const statusEl = document.getElementById("walletStatus");
        statusEl.style.display = "block";
        statusEl.textContent = "Connected: " + accounts[0];
        document.getElementById("deployBtn").disabled = false;
        document.getElementById("connectBtn").textContent = "Connected";
        document.getElementById("connectBtn").disabled = true;
      } catch (e) {
        const statusEl = document.getElementById("walletStatus");
        statusEl.style.display = "block";
        statusEl.className = "status error";
        statusEl.textContent = "Error: " + e.message;
      }
    }

    async function deploy() {
      const statusEl = document.getElementById("deployStatus");
      const resultEl = document.getElementById("result");
      const btn = document.getElementById("deployBtn");
      statusEl.style.display = "block";
      statusEl.className = "status";
      statusEl.textContent = "Deploying MintFactory to Base Mainnet...";
      btn.disabled = true;
      btn.textContent = "Deploying...";

      try {
        const accounts = await window.ethereum.request({ method: "eth_accounts" });
        const from = accounts[0];

        const txHash = await window.ethereum.request({
          method: "eth_sendTransaction",
          params: [{
            from: from,
            data: BYTECODE,
            gas: "0x200000"
          }]
        });

        statusEl.textContent = "TX sent: " + txHash + "\nWaiting for confirmation...";

        const poll = setInterval(async () => {
          const receipt = await window.ethereum.request({
            method: "eth_getTransactionReceipt",
            params: [txHash]
          });
          if (receipt && receipt.contractAddress) {
            clearInterval(poll);
            statusEl.className = "status success";
            statusEl.textContent = "MintFactory deployed!\n\nContract: " + receipt.contractAddress + "\nOwner: " + from + "\n\nCopy the contract address and give it to Claude Code.";
            resultEl.style.display = "block";
            resultEl.textContent = receipt.contractAddress;
          }
        }, 3000);
      } catch (e) {
        statusEl.className = "status error";
        statusEl.textContent = "Deploy failed: " + e.message;
        btn.disabled = false;
        btn.textContent = "Retry Deploy";
      }
    }
